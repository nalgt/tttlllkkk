<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGLOL Video Studio Pro</title>
    <style>
        :root { --accent: #f39c12; --bg: #0a0a0a; --panel: #161616; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Professional Header */
        header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { color: var(--accent); font-weight: bold; letter-spacing: 2px; }

        /* Cinema Preview Window */
        #viewport { flex: 2; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
        #mainCanvas { 
            width: 100%; max-width: 960px; aspect-ratio: 16/9; 
            background: #111; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        /* Modern Toolbar */
        .toolbar { 
            background: var(--panel); padding: 15px; display: flex; flex-wrap: wrap; 
            gap: 10px; justify-content: center; border-top: 1px solid #333;
        }
        button, .file-label { 
            background: #252525; color: white; border: 1px solid #444; padding: 10px 18px; 
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        button:hover, .file-label:hover { background: var(--accent); color: black; border-color: var(--accent); }
        .btn-save { background: #27ae60 !important; border: none !important; }
        
        input[type="text"], input[type="color"] { 
            background: #252525; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; 
        }

        /* Pro Timeline */
        #timeline-container { height: 160px; background: #0d0d0d; border-top: 1px solid #333; overflow-x: auto; padding: 20px; }
        .track { height: 35px; background: #1a1a1a; margin-bottom: 8px; border-radius: 6px; position: relative; min-width: 2500px; border: 1px dashed #333; }
        .clip { position: absolute; height: 100%; background: var(--accent); color: black; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; border-radius: 5px; }
        .audio-clip { background: #3498db; color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo">GGLOL VIDEO STUDIO</div>
    <div id="file-name" style="font-size: 12px; color: #666;">No project loaded</div>
</header>

<div id="viewport">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" crossorigin="anonymous"></video>
</div>

<div class="toolbar">
    <label for="vIn" class="file-label">📂 IMPORT VIDEO</label>
    <input type="file" id="vIn" accept="video/*" style="display:none;">
    
    <div style="display:flex; align-items:center; gap:5px; background:#111; padding:5px; border-radius:8px;">
        <input type="text" id="overlayText" placeholder="Unesi tekst...">
        <input type="color" id="textColor" value="#ffffff">
    </div>

    <button onclick="setVoice(1.6)">🐿️ PISKAV</button>
    <button onclick="setVoice(0.7)">👹 GRUB</button>
    <button onclick="setSpeed(2)">⏩ 2x</button>
    <button onclick="setSpeed(0.5)">⏪ 0.5x</button>
    <button onclick="resetAll()">🔄 RESET</button>
    <button id="saveBtn" class="btn-save">💾 EXPORT VIDEO</button>
</div>

<div id="timeline-container">
    <div class="track" id="vTrack"></div>
    <div class="track" id="aTrack"></div>
    <div class="track" id="tTrack" style="border-style: solid; border-color: #444;"></div>
</div>

<script>
    const video = document.getElementById('vSource');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const textInput = document.getElementById('overlayText');
    const colorInput = document.getElementById('textColor');
    let audioCtx, biquadFilter, isPlaying = false;

    // --- UČITAVANJE ---
    document.getElementById('vIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('file-name').innerText = file.name;
        const url = URL.createObjectURL(file);
        video.src = url;
        video.onloadedmetadata = () => {
            updateTimeline(video.duration);
            setupAudio();
            video.play();
            isPlaying = true;
            render();
        };
    };

    function updateTimeline(duration) {
        const width = duration * 40; // 40px po sekundi za bolju preglednost
        document.getElementById('vTrack').innerHTML = `<div class="clip" style="width:${width}px">VIDEO CONTENT</div>`;
        document.getElementById('aTrack').innerHTML = `<div class="clip audio-clip" style="width:${width}px">AUDIO TRACK</div>`;
        document.getElementById('tTrack').innerHTML = `<div class="clip" style="width:${width}px; background:#9b59b6; color:white;">TEXT LAYER</div>`;
    }

    function setupAudio() {
        if (audioCtx) audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(video);
        biquadFilter = audioCtx.createBiquadFilter();
        source.connect(biquadFilter);
        biquadFilter.connect(audioCtx.destination);
    }

    // --- EFEKTI ---
    function setVoice(pitch) {
        video.playbackRate = pitch;
        if(biquadFilter) biquadFilter.frequency.setTargetAtTime(pitch > 1 ? 2500 : 500, audioCtx.currentTime, 0.1);
    }

    function setSpeed(s) { video.playbackRate = s; }
    function resetAll() { video.playbackRate = 1; biquadFilter.frequency.value = 1000; }

    // --- MAIN RENDER LOOP ---
    function render() {
        canvas.width = 1920; // Full HD pravougaonik
        canvas.height = 1080;

        // 1. Crtaj Video
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // 2. Crtaj Tekst
        const text = textInput.value;
        if(text) {
            ctx.fillStyle = colorInput.value;
            ctx.font = "bold 80px Inter, sans-serif";
            ctx.textAlign = "center";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 15;
            ctx.fillText(text, canvas.width/2, canvas.height - 150);
        }

        requestAnimationFrame(render);
    }

    // --- EXPORT ---
    document.getElementById('saveBtn').onclick = () => {
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream);
        let chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, {type: 'video/mp4'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'GGLOL_Studio_Edit.mp4';
            link.click();
        };
        
        recorder.start();
        video.currentTime = 0;
        video.play();
        alert("Exportovanje pokrenuto! Sačekaj da video dođe do kraja.");
        
        video.onended = () => {
            recorder.stop();
            alert("Export uspešan!");
        };
    };
</script>
</body>
</html>
