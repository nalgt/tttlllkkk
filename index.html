<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGLOL Pro Studio Final</title>
    
    <!-- Firebase SDK (Biblioteke) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        :root { --accent: #f39c12; --bg: #0b0b0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Auth Overlay */
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .login-box { background:#1a1a1a; padding:25px; border-radius:15px; border:1px solid #333; width:280px; text-align:center; }
        input { width:90%; padding:10px; margin:8px 0; border-radius:8px; border:none; background:#2a2a2a; color:white; }

        /* Cinema Preview Area */
        #preview-zone { flex: 1.5; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
        canvas { width: 95%; max-width: 900px; aspect-ratio: 16/9; background:#111; border-radius:10px; border:1px solid #333; }

        /* YT Seekbar */
        .yt-bar { width:95%; max-width:900px; display:flex; align-items:center; gap:10px; padding:10px; }
        #seekbar { flex:1; accent-color:red; cursor:pointer; }

        /* Pro Timeline */
        #timeline { height: 180px; background:#151515; border-top:2px solid #333; overflow-x:auto; position:relative; padding:10px; white-space:nowrap; }
        .track { height:35px; background:rgba(255,255,255,0.03); margin-bottom:5px; display:flex; position:relative; border-radius:5px; border: 1px dashed #333; }
        .frame { min-width:40px; border-right:1px solid #333; font-size:9px; display:flex; align-items:center; color:#666; padding-left:2px; }
        #playhead { position:absolute; top:0; left:0; width:2px; height:100%; background:red; z-index:100; pointer-events:none; }

        /* Toolbar */
        .toolbar { background:#111; padding:12px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; border-top:1px solid #333; }
        button { background:#333; color:white; border:none; padding:10px 14px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px; }
        button:hover { background:var(--accent); color:black; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1 style="color:var(--accent);">VIDEO STUDIO PRO</h1>
    <div class="login-box">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="appStart('login')" style="background:var(--accent); color:black; width:100%;">ULAZ / LOGIN</button>
    </div>
    <button onclick="appStart('guest')" style="background:none; color:gray; margin-top:15px;">Nastavi kao Gost</button>
</div>

<div id="preview-zone">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" crossorigin="anonymous" playsinline></video>
    <div class="yt-bar">
        <button onclick="togglePlay()">▶/⏸</button>
        <input type="range" id="seekbar" value="0" step="0.01">
        <span id="timer">00:00</span>
    </div>
</div>

<div class="toolbar">
    <label for="vIn" style="background:#444; padding:10px; border-radius:6px; cursor:pointer; font-size:12px;">📂 UBACI VIDEO</label>
    <input type="file" id="vIn" accept="video/*" style="display:none;">
    
    <input type="text" id="txtIn" placeholder="Tekst..." style="width:120px; background:#222; color:white; border:1px solid #444; padding:8px; border-radius:6px;">
    <button style="background:#9b59b6;" onclick="addText()">➕ UBACI TEKST</button>
    <button style="background:#3498db;" onclick="splitFrames()">✂️ PREPOLOVI FREJMOVE</button>
    
    <button onclick="setVoice(1.6)">🐿️ PISKAV</button>
    <button onclick="setVoice(0.6)">👹 GRUB</button>
    <button onclick="playSFX('https://soundjay.com')">🎵 KLIK</button>
    <button onclick="fastExport()" style="background:#27ae60;">💾 BRZI EXPORT (4x)</button>
</div>

<div id="timeline">
    <div id="playhead"></div>
    <div class="track" id="vTrack"></div>
    <div class="track" id="tTrack" style="background:rgba(155, 89, 182, 0.1);"></div>
</div>

<script>
    // 1. GLOBALNE VARIJABLE
    var video = document.getElementById('vSource');
    var canvas = document.getElementById('mainCanvas');
    var ctx = canvas.getContext('2d');
    var seekbar = document.getElementById('seekbar');
    var audioCtx, biquadFilter, sourceNode, auth, storage;
    var activeTexts = [];
    var zoomLevel = 1;
    var isExporting = false;

    // 2. FIREBASE (Opciono - Zameni ključeve ako želiš Cloud)
    const firebaseConfig = { apiKey: "KEY", authDomain: "://firebaseapp.com", projectId: "ID", storageBucket: "://appspot.com", appId: "ID" };
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth(); storage = firebase.storage();
    }

    // 3. START APLIKACIJE
    async function appStart(mode) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        } catch (e) { console.log("AudioContext error"); }

        if(mode === 'login') localStorage.setItem('saved_user', document.getElementById('username').value);
        document.getElementById('authOverlay').style.display = 'none';
        render(); // Pokreće render petlju
    }

    // 4. UBACIVANJE VIDEA - FIX ZA PRIKAZ
    document.getElementById('vIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        video.src = URL.createObjectURL(file);
        video.load();
        video.onloadeddata = () => {
            seekbar.max = video.duration;
            canvas.width = 1280; canvas.height = 720;
            drawTimeline();
            // Kratak play/pause da se "osveži" slika na ekranu
            video.play().then(() => { setTimeout(() => video.pause(), 50); });
        };
    };

    // 5. RENDER PETLJA
    function render() {
        if (video.readyState >= 2) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            activeTexts.forEach(t => {
                if(video.currentTime >= t.start && video.currentTime <= t.end) {
                    ctx.fillStyle = "white"; ctx.font = "bold 60px sans-serif";
                    ctx.textAlign = "center"; ctx.shadowColor = "black"; ctx.shadowBlur = 15;
                    ctx.fillText(t.content, canvas.width/2, 620);
                }
            });
        }
        requestAnimationFrame(render);
    }

    // 6. AUDIO I GLAS
    function setupAudio() {
        if (!sourceNode && audioCtx) {
            sourceNode = audioCtx.createMediaElementSource(video);
            biquadFilter = audioCtx.createBiquadFilter();
            sourceNode.connect(biquadFilter);
            biquadFilter.connect(audioCtx.destination);
        }
    }

    function setVoice(pitch) {
        if (!audioCtx) return;
        setupAudio();
        video.playbackRate = pitch;
        biquadFilter.frequency.setTargetAtTime(pitch > 1 ? 2500 : 500, audioCtx.currentTime, 0.1);
    }

    function playSFX(url) {
        let s = new Audio(url); s.crossOrigin = "anonymous"; s.play();
    }

    // 7. TIMELINE I KONTROLE
    function togglePlay() { video.paused ? video.play() : video.pause(); }
    
    video.ontimeupdate = () => {
        if(isExporting) return;
        seekbar.value = video.currentTime;
        document.getElementById('timer').innerText = Math.floor(video.currentTime) + "s";
        let pos = (video.currentTime / video.duration) * document.getElementById('vTrack').scrollWidth;
        document.getElementById('playhead').style.left = (pos || 0) + "px";
    };

    seekbar.oninput = () => { video.currentTime = seekbar.value; };

    function drawTimeline() {
        const vTrack = document.getElementById('vTrack');
        vTrack.innerHTML = "";
        let total = Math.floor(video.duration * zoomLevel);
        for(let i=0; i<=total; i++) {
            let f = document.createElement('div');
            f.className = 'frame'; f.style.minWidth = (40 / zoomLevel) + "px";
            f.innerText = (i/zoomLevel).toFixed(1) + "s";
            vTrack.appendChild(f);
        }
    }

    function splitFrames() { zoomLevel *= 2; drawTimeline(); }

    function addText() {
        const val = document.getElementById('txtIn').value;
        if(!val) return;
        activeTexts.push({ content: val, start: video.currentTime, end: video.currentTime + 2 });
        document.getElementById('txtIn').value = "";
        updateTextMarkers();
    }

    function updateTextMarkers() {
        const tTrack = document.getElementById('tTrack');
        tTrack.innerHTML = "";
        activeTexts.forEach(t => {
            let m = document.createElement('div');
            m.style.position = "absolute";
            m.style.left = (t.start / video.duration * 100) + "%";
            m.style.width = (2 / video.duration * 100) + "%";
            m.style.height = "100%"; m.style.background = "#9b59b6";
            tTrack.appendChild(m);
        });
    }

    // 8. BRZI EXPORT (4x Brzina)
    async function fastExport() {
        isExporting = true;
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'GGLOL_Edit.mp4'; a.click();
            video.playbackRate = 1; isExporting = false; alert("Export gotov!");
        };

        video.currentTime = 0;
        video.playbackRate = 4.0;
        recorder.start();
        video.play();
        video.onended = () => recorder.stop();
    }
</script>
</body>
</html>
