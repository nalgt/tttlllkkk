<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGLOL Studio - Pro Export</title>
    <style>
        :root { --accent: #f39c12; --bg: #0b0b0b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #preview-zone { flex: 1.5; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
        canvas { width: 95%; max-width: 850px; aspect-ratio: 16/9; background:#111; border-radius:10px; border:1px solid #333; }
        
        /* Render Overlay */
        #renderOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; flex-direction:column; align-items:center; justify-content:center; }
        .bar { width: 70%; height: 6px; background: #222; border-radius: 3px; margin: 20px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: var(--accent); }

        .toolbar { background:#111; padding:15px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
        button, label { background:#333; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1 style="color:var(--accent);">VIDEO STUDIO</h1>
    <button onclick="appStart()" style="background:var(--accent); padding:15px 40px; border-radius:10px; font-weight:bold;">KRENI</button>
</div>

<div id="renderOverlay">
    <h2>RENDEROVANJE...</h2>
    <div class="bar"><div id="progress"></div></div>
    <p id="perc">0%</p>
    <p style="font-size: 12px; color: #555;">Molimo ne gasite aplikaciju</p>
</div>

<div id="preview-zone">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" crossorigin="anonymous"></video>
    <input type="range" id="seekbar" style="width:90%; accent-color:red; margin:10px;">
</div>

<div class="toolbar">
    <label for="vIn">📂 UBACI</label>
    <input type="file" id="vIn" accept="video/*" style="display:none;">
    <button onclick="setVoice(1.5)">🐿️ PISKAV</button>
    <button onclick="setVoice(0.7)">👹 GRUB</button>
    <button onclick="exportVideo()" style="background:#27ae60;">💾 SAČUVAJ VIDEO</button>
</div>

<script>
    var video = document.getElementById('vSource');
    var canvas = document.getElementById('mainCanvas');
    var ctx = canvas.getContext('2d');
    var audioCtx, biquadFilter, sourceNode, destNode;

    async function appStart() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('authOverlay').style.display = 'none';
        render();
    }

    function setupAudio() {
        if (!sourceNode && audioCtx) {
            sourceNode = audioCtx.createMediaElementSource(video);
            biquadFilter = audioCtx.createBiquadFilter();
            destNode = audioCtx.createMediaStreamDestination();
            sourceNode.connect(biquadFilter);
            biquadFilter.connect(audioCtx.destination);
            biquadFilter.connect(destNode);
        }
    }

    document.getElementById('vIn').onchange = (e) => {
        video.src = URL.createObjectURL(e.target.files[0]);
        video.onloadeddata = () => { document.getElementById('seekbar').max = video.duration; canvas.width = 1280; canvas.height = 720; };
    };

    function setVoice(p) { setupAudio(); video.playbackRate = 1.0; biquadFilter.frequency.value = p > 1 ? 2500 : 500; }

    function render() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(render);
    }

    // --- PAMETNI EKSPORT (Normalna brzina u fajlu, Loading ekran za korisnika) ---
    function exportVideo() {
        setupAudio();
        const overlay = document.getElementById('renderOverlay');
        const prog = document.getElementById('progress');
        const perc = document.getElementById('perc');
        
        overlay.style.display = 'flex';
        video.pause();
        video.currentTime = 0;
        video.playbackRate = 1.0; // MORA biti 1.0 da bi snimak bio normalan

        const stream = new MediaStream([
            ...canvas.captureStream(30).getVideoTracks(),
            ...destNode.stream.getAudioTracks()
        ]);

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'GGLOL_Studio_Edit.mp4'; a.click();
            overlay.style.display = 'none';
        };

        recorder.start();
        video.play();

        // Prati progres i ugasi kad završi
        const track = setInterval(() => {
            let p = (video.currentTime / video.duration) * 100;
            prog.style.width = p + "%";
            perc.innerText = Math.floor(p) + "%";
            if(video.ended) {
                clearInterval(track);
                recorder.stop();
            }
        }, 100);
    }

    document.getElementById('seekbar').oninput = (e) => { video.currentTime = e.target.value; };
</script>
</body>
</html>
